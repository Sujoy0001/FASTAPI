<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

    <script src="assets/app.js"></script>
</body>
</html>
